<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SARS — Student Academic Risk Assessment System</title>
  <meta name="description" content="Explainable AI-powered academic risk assessment and advisory for B.Tech students." />
  <style>
    /* Prevent flash of unstyled content */
    body { margin: 0; background: #0a0f1e; }
    /* Spinner visible before React mounts */
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
    }
    #loading div {
      width: 36px; height: 36px;
      border: 3px solid #1e293b; border-top-color: #38bdf8;
      border-radius: 50%; animation: s 0.8s linear infinite;
    }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading"><div></div></div>
  </div>
</body>
</html>
